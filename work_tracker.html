<!DOCTYPE html>
<html>
<head>
    <title>Work Tracker - Submit Task</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7fc; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #4b0082; padding-bottom: 10px; margin-bottom: 20px; }
        
        .user-info { background: #f8f9fa; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #555; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        
        textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-family: inherit; 
            resize: vertical; 
            min-height: 120px;
            box-sizing: border-box;
        }

        .btn-submit { 
            background: #4b0082; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #3a0066; transform: translateY(-2px); }

        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: #666; font-size: 14px; }
        .back-link:hover { color: #4b0082; }
    </style>
</head>
<body>

<div class="container">
    <h2>⏱️ Work Tracker</h2>
    
    <div class="user-info">
        Logged in as: <b>{{ session['user'] }}</b> | Date: <b>{{ now_date }}</b>
    </div>

    <form method="POST" action="/work_tracker">
        <div class="form-group">
            <label for="task">What tasks did you work on today?</label>
            <textarea name="task" id="task" placeholder="Example: Completed the login module and fixed UI bugs in the dashboard..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">🚀 Submit Work Report</button>
    </form>

    <a href="/employee_dashboard" class="back-link">⬅ Back to Dashboard</a>
</div>

</body>
</html>
