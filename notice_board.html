<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Notice Board</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #c2e9fb, #a1c4fd);
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #007bff;
        }

        .notice {
            background: #f4faff;
            border-left: 6px solid #4facfe;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .notice h3 {
            margin: 0;
            color: #222;
        }

        .notice p {
            margin-top: 8px;
            color: #555;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="{{ url_for('employee_dashboard') }}">⬅ Back to Dashboard</a>
        <h2>📢 Notice Board</h2>

        {% for notice in notices %}
            <div class="notice">
                <h3>{{ notice['title'] }}</h3>
                <p>{{ notice['message'] }}</p>
            </div>
        {% else %}
            <p style="text-align:center;">No notices available.</p>
        {% endfor %}
    </div>
</body>
</html>
