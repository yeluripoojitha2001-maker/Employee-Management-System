<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url("{{ url_for('static', filename='images/login-bg.jpg') }}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reg-card {
            background: #ffffff;
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
            text-align: center;
            border: 1px solid #ddd;
        }

        h2 { color: #000; font-size: 19px; margin: 0; font-weight: bold; line-height: 1.2; }
        p.sub-text { color: #555; font-size: 13px; margin: 10px 0 20px 0; font-weight: 600; }

        input {
            width: 100%;
            padding: 11px;
            margin: 8px 0;
            border: 1px solid #333;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #218838; }

        /* 🚀 Back to Login Link Style */
        .footer-link {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer-link a {
            color: #0000ff;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2>Employee Management System</h2>
    <p class="sub-text">Register</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="color: #721c24; background: #f8d7da; padding: 8px; border-radius: 5px; margin-bottom: 10px; font-size: 12px; font-weight: bold;">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
        <input type="hidden" name="role" value="employee">
        <input type="text" name="username" placeholder="Choose Username" required>
        <input type="password" name="password" placeholder="Create Password" required>
        <button type="submit">Register Now</button>
    </form>

    <div class="footer-link">
        <a href="/"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>

</body>
</html>
